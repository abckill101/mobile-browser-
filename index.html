            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* พื้นหลังแอนิเมชั่น */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* คอนเทนเนอร์หลัก */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 50px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        .header p {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
        }

        /* แถบค้นหา */
        .search-wrapper {
            margin-bottom: 30px;
            animation: fadeInUp 1s ease 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 5px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-box:focus-within {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .search-icon {
            padding: 15px 20px;
            color: white;
            font-size: 1.2rem;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1rem;
            padding: 15px 10px;
            font-family: 'Kanit', sans-serif;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .clear-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            margin-right: 5px;
            transition: all 0.3s ease;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .clear-btn.show {
            display: flex;
        }

        /* Grid สำหรับการ์ด */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            animation: fadeInUp 1s ease 0.4s both;
        }

        /* การ์ด */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* ข้อมูลไฟล์ */
        .file-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex: 1;
        }

        .file-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .file-icon::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .file-details {
            flex: 1;
            min-width: 0;
        }

        .file-details h3 {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            color: white;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        .file-details .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.9);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 300;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ปุ่ม */
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 15px;
            border: none;
            border-radius: 15px;
            font-family: 'Kanit', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* สถิติ */
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-value {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            color: white;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
        }

        /* ปุ่มเลื่อนขึ้นด้านบน */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .scroll-top:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-5px);
        }

        .scroll-top.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            z-index: 10000;
            animation: slideUp 0.3s ease;
            white-space: nowrap;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .card-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .card {
                padding: 15px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .logo {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }

            .search-input {
                font-size: 0.9rem;
            }

            .stats {
                gap: 15px;
            }

            .stat-item {
                padding: 10px 20px;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1025px) {
            .card-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Loading effect */
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

                                </div>
                            </div>
                            <div class="button-group">
                                <a href="${item.url}" target="_blank" class="btn btn-primary">
                                    <i class="fas fa-external-link-alt"></i> เปิดลิงก์
                                </a>
                                <button class="btn btn-secondary copy-btn" data-url="${escapeHtml(item.url)}">
                                    <i class="fas fa-copy"></i> คัดลอก
                                </button>
                            </div>
                        `;
                        
                        cardGrid.appendChild(card);
                    });
                    
                    // เพิ่ม event listeners สำหรับปุ่มคัดลอก
                    document.querySelectorAll('.copy-btn').forEach(btn => {
                        btn.addEventListener('click', function(e) {
                            e.preventDefault();
                            const url = this.getAttribute('data-url');
                            copyToClipboard(url);
                        });
                    });
                }
                
                // อัพเดทจำนวนที่แสดง
                visibleLinksEl.textContent = data.length;
            }

            // ฟังก์ชันคัดลอก
            function copyToClipboard(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => {
                        showToast('✅ คัดลอกลิงก์เรียบร้อย!');
                    }).catch(() => {
                        fallbackCopy(text);
                    });
                } else {
                    fallbackCopy(text);
                }
            }

            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showToast('✅ คัดลอกลิงก์เรียบร้อย!');
                } catch (err) {
                    showToast('❌ ไม่สามารถคัดลอกได้');
                }
                document.body.removeChild(textarea);
            }

            // ฟังก์ชันแสดง Toast
            function showToast(message) {
                const existingToast = document.querySelector('.toast');
                if (existingToast) {
                    existingToast.remove();
                }
                
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s ease';
                    setTimeout(() => toast.remove(), 300);
                }, 2000);
            }

            // ฟังก์ชัน escape HTML
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // ค้นหา
            function searchLinks(keyword) {
                const searchTerm = keyword.toLowerCase().trim();
                
                if (searchTerm === '') {
                    return linksData;
                }
                
                return linksData.filter(item => 
                    item.title.toLowerCase().includes(searchTerm) ||
                    item.type.toLowerCase().includes(searchTerm)
                );
            }

            // Event Listeners
            searchInput.addEventListener('input', function(e) {
                const keyword = e.target.value;
                const filteredData = searchLinks(keyword);
                createCards(filteredData);
                
                // แสดง/ซ่อนปุ่มล้าง
                if (keyword.length > 0) {
                    clearBtn.classList.add('show');
                } else {
                    clearBtn.classList.remove('show');
                }
            });

            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                createCards(linksData);
                clearBtn.classList.remove('show');
                searchInput.focus();
            });

            // ปุ่มเลื่อนขึ้นด้านบน
            window.addEventListener('scroll', function() {
                if (window.pageYOffset > 300) {
                    scrollTopBtn.classList.add('show');
                } else {
                    scrollTopBtn.classList.remove('show');
                }
            });

            scrollTopBtn.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                // Ctrl+K หรือ / เพื่อค้นหา
                if ((e.ctrlKey && e.key === 'k') || (e.key === '/' && document.activeElement !== searchInput)) {
                    e.preventDefault();
                    searchInput.focus();
                }
                // Escape เพื่อล้างการค้นหา
                if (e.key === 'Escape' && document.activeElement === searchInput) {
                    searchInput.value = '';
                    createCards(linksData);
                    clearBtn.classList.remove('show');
                    searchInput.blur();
                }
            });

            // เริ่มต้นแสดงข้อมูล
            createCards(linksData);

            // เพิ่มประสิทธิภาพการโหลด
            window.addEventListener('load', function() {
                document.body.style.opacity = '1';
                document.body.style.transition = 'opacity 0.5s ease';
            });

            console.log('🚀 Tera Download Hub พร้อมใช้งานแล้ว!');
            console.log('💡 Tips: กด / เพื่อค้นหา, กด Esc เพื่อล้างการค้นหา');
        })();
    </script>
</body>
</html>
