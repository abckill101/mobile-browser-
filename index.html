<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Tera Download Hub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    background:
    radial-gradient(circle at top left,#ffd36e 0%,transparent 35%),
    radial-gradient(circle at top right,#7ad7ff 0%,transparent 30%),
    linear-gradient(180deg,#0f172a 0%,#111827 100%);

    min-height:100vh;
    padding:20px;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:24px;
}

.logo{
    width:80px;
    height:80px;
    margin:auto;
    border-radius:24px;

    background:linear-gradient(135deg,#ffb300,#ff6f00,#29b6f6);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:38px;

    margin-bottom:16px;
}

.header h1{
    font-size:28px;
    font-weight:700;
}

.header p{
    color:#cbd5e1;
    margin-top:6px;
}

.card{
    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.12);

    border-radius:24px;

    padding:18px;

    margin-bottom:16px;

    backdrop-filter:blur(12px);

    transition:.25s;
}

.card:hover{
    transform:translateY(-3px);
}

.file-top{
    display:flex;
    gap:14px;
    align-items:center;
    margin-bottom:14px;
}

.icon{
    width:58px;
    height:58px;

    border-radius:18px;

    background:linear-gradient(135deg,#ffd54f,#ff9800);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:26px;
}

.info{
    flex:1;
}

.info h2{
    font-size:18px;
    margin-bottom:4px;
}

.info span{
    color:#cbd5e1;
    font-size:13px;
}

.btn-group{
    display:flex;
    gap:10px;
}

.btn{
    flex:1;

    border:none;

    padding:14px;

    border-radius:16px;

    text-align:center;

    font-weight:600;

    cursor:pointer;

    text-decoration:none;

    transition:.25s;
}

.open-btn{
    background:linear-gradient(135deg,#ffca28,#ff9800);
    color:#111827;
}

.copy-btn{
    background:rgba(255,255,255,.08);
    color:white;
    border:1px solid rgba(255,255,255,.15);
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#94a3b8;
}

@media(max-width:480px){

    body{
        padding:14px;
    }

    .btn{
        font-size:14px;
        padding:13px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">☁️</div>

        <h1>Tera Download Hub</h1>

        <p>ระบบรวมลิงก์ดาวน์โหลดมือถือ</p>
    </div>

    <!-- CARD จะถูกสร้างตรงนี้ -->
    <div id="cardContainer"></div>

    <div class="footer">
        Modern Mobile UI
    </div>

</div>

<script>

const links = [

{
    title:"รวม 53",
    type:"Tera Downloader",
    icon:"📦",
    url:"https://teradownloader.com/download?l=YOUR_LINK"
},

{
    title:"รวม 23",
    type:"Tera Downloader",
    icon:"⚡",
    url:"https://teradownloader.com/download?l=YOUR_LINK"
},

{
    title:"TH-Live 8",
    type:"Tera Downloader",
    icon:"🔥",
    url:"https://teradownloader.com/download?l=YOUR_LINK"
}

];

const container = document.getElementById("cardContainer");

links.forEach(item => {

    container.innerHTML += `

    <div class="card">

        <div class="file-top">

            <div class="icon">${item.icon}</div>

            <div class="info">
                <h2>${item.title}</h2>
                <span>${item.type}</span>
            </div>

        </div>

        <div class="btn-group">

            <a
            class="btn open-btn"
            href="${item.url}"
            target="_blank">

            เปิดลิงก์

            </a>

            <button
            class="btn copy-btn"
            onclick="copyLink('${item.url}')">

            คัดลอก

            </button>

        </div>

    </div>

    `;

});

async function copyLink(link){

    try{

        await navigator.clipboard.writeText(link);

        alert("คัดลอกลิงก์แล้ว");

    }catch(error){

        // fallback มือถือบางรุ่น
        const textarea = document.createElement("textarea");

        textarea.value = link;

        document.body.appendChild(textarea);

        textarea.select();

        document.execCommand("copy");

        document.body.removeChild(textarea);

        alert("คัดลอกลิงก์แล้ว");
    }

}

</script>

</body>
</html>
