<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="
width=device-width,
initial-scale=1,
viewport-fit=cover
"
/>

<title>Premium Mobile Video Gallery</title>

<style>

/* =========================
THEME
========================= */

:root{

    --bg:#eef5ff;

    --card:#ffffff;

    --blue:#53b7ff;

    --blue2:#7fd5ff;

    --orange:#ff9f43;

    --gold:#ffcc4d;

    --text:#20242c;

    --sub:#7f8b99;
}

/* =========================
RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:
    linear-gradient(
    180deg,
    #eef5ff,
    #f8fbff
    );

    font-family:
    "SF Pro Display",
    "Segoe UI",
    sans-serif;

    color:var(--text);

    overflow:hidden;

    height:100vh;
}

/* =========================
TOPBAR
========================= */

.topbar{

    position:fixed;

    top:0;
    left:0;
    right:0;

    height:78px;

    padding:
    env(safe-area-inset-top)
    14px
    12px;

    display:flex;

    align-items:center;

    gap:10px;

    z-index:1000;

    background:
    rgba(255,255,255,.75);

    backdrop-filter:
    blur(18px);
}

/* SEARCH */

.search{

    flex:1;

    height:50px;

    border:none;

    border-radius:18px;

    background:white;

    padding:0 16px;

    font-size:15px;

    color:#222;

    box-shadow:
    0 8px 24px
    rgba(83,183,255,.12);
}

.search:focus{

    outline:none;

    border:
    2px solid var(--blue);
}

/* ADD BUTTON */

.add-btn{

    width:50px;
    height:50px;

    border:none;

    border-radius:50%;

    font-size:28px;

    color:white;

    cursor:pointer;

    background:
    linear-gradient(
    135deg,
    var(--blue),
    var(--blue2)
    );

    box-shadow:
    0 10px 24px
    rgba(83,183,255,.35);
}

/* =========================
CONTENT
========================= */

.content{

    position:fixed;

    top:78px;
    left:0;
    right:0;
    bottom:84px;

    overflow-y:auto;

    padding:14px;

    -webkit-overflow-scrolling:
    touch;
}

/* =========================
GRID
========================= */

.grid{

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:14px;
}

/* =========================
CARD
========================= */

.card{

    background:white;

    border-radius:24px;

    overflow:hidden;

    box-shadow:
    0 12px 28px
    rgba(83,183,255,.10);

    animation:fade .22s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(8px);
    }

    to{
        opacity:1;
        transform:none;
    }
}

/* =========================
THUMB
========================= */

.thumb{

    position:relative;

    aspect-ratio:3/4;

    overflow:hidden;

    background:#dfe7ef;
}

.thumb img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* PLAY */

.play{

    position:absolute;

    inset:0;

    display:flex;

    align-items:center;
    justify-content:center;

    font-size:44px;

    color:white;

    background:
    rgba(0,0,0,.16);

    backdrop-filter:
    blur(4px);

    cursor:pointer;
}

/* DURATION */

.duration{

    position:absolute;

    right:10px;
    bottom:10px;

    background:
    rgba(255,255,255,.9);

    color:#222;

    font-size:11px;

    font-weight:600;

    padding:5px 8px;

    border-radius:10px;
}

/* =========================
INFO
========================= */

.info{
    padding:12px;
}

.title{

    font-size:13px;

    font-weight:600;

    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;

    margin-bottom:8px;
}

.meta{

    font-size:11px;

    color:var(--sub);

    margin-bottom:12px;
}

/* =========================
BUTTONS
========================= */

.actions{

    display:flex;

    gap:8px;
}

.small-btn{

    flex:1;

    height:34px;

    border:none;

    border-radius:12px;

    font-size:12px;

    cursor:pointer;

    transition:.15s;
}

.small-btn:active{

    transform:scale(.96);
}

/* COPY */

.copy{

    background:
    linear-gradient(
    135deg,
    #f5f8ff,
    #e9f2ff
    );

    color:var(--blue);
}

/* DELETE */

.delete{

    background:
    linear-gradient(
    135deg,
    var(--orange),
    #ff7b54
    );

    color:white;
}

/* =========================
BOTTOM NAV
========================= */

.bottom{

    position:fixed;

    left:0;
    right:0;
    bottom:0;

    height:84px;

    background:
    rgba(255,255,255,.84);

    backdrop-filter:
    blur(16px);

    border-top:
    1px solid #edf2f7;

    display:flex;

    justify-content:space-around;

    align-items:center;

    padding-bottom:
    env(safe-area-inset-bottom);

    z-index:9999;
}

/* TAB */

.tab{

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:5px;

    font-size:11px;

    color:#8d99a8;

    cursor:pointer;
}

/* ICON */

.icon{

    width:44px;
    height:44px;

    border-radius:15px;

    display:flex;

    align-items:center;
    justify-content:center;

    font-size:21px;
}

/* ACTIVE TAB */

.active{
    color:var(--blue);
}

.active .icon{

    background:
    linear-gradient(
    135deg,
    var(--blue),
    var(--gold)
    );

    color:white;

    box-shadow:
    0 10px 24px
    rgba(83,183,255,.26);
}

/* =========================
PLAYER OVERLAY
========================= */

.player{

    position:fixed;

    inset:0;

    background:
    rgba(0,0,0,.92);

    display:none;

    align-items:center;
    justify-content:center;

    padding:20px;

    z-index:99999;
}

/* FIX VIDEO SIZE */

.player video{

    width:800px;
    height:500px;

    max-width:100%;
    max-height:100%;

    object-fit:contain;

    background:black;

    border-radius:20px;

    box-shadow:
    0 20px 60px
    rgba(0,0,0,.45);
}

/* CLOSE BUTTON */

.close-player{

    position:absolute;

    top:20px;
    right:20px;

    width:50px;
    height:50px;

    border:none;

    border-radius:50%;

    background:
    rgba(255,255,255,.18);

    backdrop-filter:
    blur(10px);

    color:white;

    font-size:22px;

    cursor:pointer;

    z-index:5;
}

/* EMPTY */

.empty{

    text-align:center;

    margin-top:100px;

    color:#95a3b5;

    font-size:14px;
}

</style>
</head>

<body>

<!-- =========================
TOPBAR
========================= -->

<div class="topbar">

    <input
        class="search"
        id="search"
        placeholder="วางลิงก์ mp4"
    >

    <button
        class="add-btn"
        id="addBtn"
    >
        +
    </button>

</div>

<!-- =========================
CONTENT
========================= -->

<div class="content">

    <div
        class="grid"
        id="grid"
    ></div>

</div>

<!-- =========================
BOTTOM NAV
========================= -->

<div class="bottom">

    <!-- HOME -->

    <div class="tab active">

        <div class="icon">
            ⌂
        </div>

        Home

    </div>

    <!-- LOADER -->

    <div
        class="tab"
        id="loaderTab"
    >

        <div class="icon">
            ⬇
        </div>

        Loader

    </div>

</div>

<!-- =========================
PLAYER
========================= -->

<div
    class="player"
    id="player"
>

    <button
        class="close-player"
        id="closePlayer"
    >
        ✕
    </button>

    <video
        id="mainVideo"
        controls
        playsinline
        webkit-playsinline
        preload="metadata"
    ></video>

</div>

<script>

/* =========================
STORAGE
========================= */

const STORAGE =
"premium_mobile_video_gallery";

/* =========================
DATA
========================= */

let videos =
JSON.parse(
localStorage.getItem(STORAGE)
) || [];

/* =========================
ELEMENTS
========================= */

const grid =
document.getElementById("grid");

/* =========================
SAVE
========================= */

function save(){

    localStorage.setItem(
        STORAGE,
        JSON.stringify(videos)
    );
}

/* =========================
VALIDATE
========================= */

function validVideo(url){

    return(

        url.includes(".mp4") ||

        url.includes("blob:") ||

        url.includes("video")
    );
}

/* =========================
CREATE CARD
========================= */

function createCard(video){

    const card =
    document.createElement("div");

    card.className = "card";

    card.dataset.url =
    video.url;

    card.innerHTML = `

    <div class="thumb">

        <img
            loading="lazy"
            src="${video.thumb}"
        >

        <div class="play">
            ▶
        </div>

        <div class="duration">
            800×500
        </div>

    </div>

    <div class="info">

        <div class="title">
            ${video.url}
        </div>

        <div class="meta">
            Premium MP4 Video
        </div>

        <div class="actions">

            <button
                class="small-btn copy"
            >
                Copy
            </button>

            <button
                class="small-btn delete"
            >
                Delete
            </button>

        </div>

    </div>
    `;

    return card;
}

/* =========================
RENDER
========================= */

function render(){

    grid.innerHTML = "";

    if(videos.length === 0){

        grid.innerHTML = `
        <div class="empty">
            ยังไม่มีวิดีโอ
        </div>
        `;

        return;
    }

    const fragment =
    document.createDocumentFragment();

    videos
    .slice(0,6)
    .forEach(video=>{

        fragment.appendChild(
            createCard(video)
        );
    });

    grid.appendChild(fragment);
}

/* =========================
ADD VIDEO
========================= */

function addVideo(){

    const input =
    document.getElementById(
        "search"
    );

    const url =
    input.value.trim();

    if(!url){

        alert(
            "กรุณาใส่ลิงก์"
        );

        return;
    }

    if(!validVideo(url)){

        alert(
            "ลิงก์ไม่รองรับ"
        );

        return;
    }

    videos.unshift({

        id:Date.now(),

        url,

        thumb:
        "https://dummyimage.com/400x600/dbeeff/6aaeff&text=VIDEO"
    });

    save();

    render();

    input.value = "";
}

document
.getElementById("addBtn")
.onclick =
addVideo;

/* =========================
ENTER KEY
========================= */

document
.getElementById("search")
.addEventListener(

    "keypress",

    e=>{

        if(e.key==="Enter"){

            addVideo();
        }
    }
);

/* =========================
GRID EVENTS
========================= */

grid.addEventListener(

    "click",

    e=>{

        const card =
        e.target.closest(".card");

        if(!card) return;

        const url =
        card.dataset.url;

        /* PLAY */

        if(
            e.target.closest(".play")
        ){

            const player =
            document.getElementById(
                "player"
            );

            const video =
            document.getElementById(
                "mainVideo"
            );

            player.style.display =
            "flex";

            video.src = url;

            video.play();
        }

        /* COPY */

        if(
            e.target.closest(".copy")
        ){

            navigator.clipboard
            .writeText(url);
        }

        /* DELETE */

        if(
            e.target.closest(".delete")
        ){

            videos =
            videos.filter(
                v=>v.url!==url
            );

            save();

            render();
        }
    }
);

/* =========================
CLOSE PLAYER
========================= */

document
.getElementById(
    "closePlayer"
)
.onclick = ()=>{

    const player =
    document.getElementById(
        "player"
    );

    const video =
    document.getElementById(
        "mainVideo"
    );

    player.style.display =
    "none";

    video.pause();

    video.src = "";
};

/* =========================
LOADER TAB
========================= */

document
.getElementById("loaderTab")
.onclick = ()=>{

    window.open(
        "https://www.locoloader.com/",
        "_blank"
    );
};

/* =========================
AUTO CLIPBOARD
========================= */

async function autoClipboard(){

    try{

        const text =
        await navigator
        .clipboard
        .readText();

        if(
            validVideo(text)
        ){

            document
            .getElementById(
                "search"
            )
            .value = text;
        }

    }catch{}
}

autoClipboard();

/* =========================
INIT
========================= */

render();

</script>

</body>
</html>
